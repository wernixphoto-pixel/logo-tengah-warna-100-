<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube Closing Screen</title>

<style>
html,
body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
}

/* Menutupi seluruh layar */
.closing-screen{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:9999;
}

/* Gambar memenuhi seluruh frame */
.closing-screen img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
}
</style>

</head>

<body>

<div class="closing-screen">
    <img src="logo tengah warna.png" alt="Closing Screen">
</div>

</body>
</html>
