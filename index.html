<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>100% tengah</title>

<style>
html,
body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:transparent;
}

.logo{
    position:fixed;

    /* Posisi kiri atas */
    top:2%;
    left:2%;

    /* Responsif */
    width:10vw;
    max-width:200px;
    min-width:80px;
    height:auto;

    z-index:9999;
    pointer-events:none;
    user-select:none;
}

/* Layar HP */
@media (max-width:768px){
    .logo{
        width:18vw;
    }
}

/* Layar sangat kecil */
@media (max-width:480px){
    .logo{
        width:22vw;
    }
}
</style>

</head>

<body>

<img
    class="logo"
    src="logo tengah warna.png"
    alt="Logo"
>

</body>
</html>
